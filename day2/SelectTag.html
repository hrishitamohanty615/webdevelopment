<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    <select name="country">
        <option>India</option>
        <option>Russian</option>
        <option>Japan</option>
        <option disabled>Germany</option>
        <option selected disabled>Country</option>
        <option label="USA">United states of America</option>

    </select>


    <select required>
        <option>Delhi</option>
        <option>Mumbai</option>
    </select>

    <select disabled>
        <option>Delhi</option>
        <option>Mumbai</option>
    </select>

    <select multiple>
        <option>Delhi</option>
        <option>Mumbai</option>
    </select>

    <select Size="3">
        <option>Delhi</option>
        <option>Mumbai</option>
        <option>Mysore</option>
        <option>Bangolore</option>
        <option>Chennai</option>
    </select>




</body>
</html>
